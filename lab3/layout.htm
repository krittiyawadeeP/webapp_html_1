<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout</title>


    <style>

        header{
            height: 50px;
            background-color: antiquewhite;
        }
        nav{
            width: 25%;
            height: 70px;
            background-color: aqua;
            float: left;
        }
        main{
            width: 50%;
            height: 70px;
            color: rgb(197, 137, 46);
            background-color: pink;
            float: left;
        }

        aside{
            width: 25%;
            height: 100px;
            background-color: palevioletred;
            float: right;

        }
        footer
        {
            height: 50px;
            background-color: brown;
            clear: both;
        }


    </style>
</head>


<body>
    <header>header</header>
    <nav>nav</nav>
    <main>main</main>
    <aside>aside</aside>
    <footer>footer</footer>
</body>
</html>
