<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background:#f1f1f1;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width: 300px;
            height: 450px;
            background-color: aliceblue;
            text-align:center;
            border: 2px solid black;
            box-shadow:0 4px 10px rgba(0,0,0,.3);
        }
        .card img{
            width: 100%;
            height: 40%;
            object-fit: cover;
        }

        h1{
            font-size: 40px;
            font-weight: 300;
            margin-top: 20px;

        }

        .card .title{
            font-size: 20px;
            color: rgb(97, 97, 97);
            margin-top: 40px;
            margin-bottom: 35px;
        }
        .card .contact{
            padding: 10px;
            margin-top: 45px;
            background-color: black;
            color: #f1f1f1;


        }

    </style>
    

   


</head>
<body>
    <div class="card">
        <img alt="img" src="img/images.jpg">
        <h1>john H watson</h1>
        <p class="title">staff and CEO </p>
        <p>Harvard University</p>
        <p class="contact">contact</p>




    </div>
</body>
</html>
