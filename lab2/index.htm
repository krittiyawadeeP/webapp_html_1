<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* background-color: cornflowerblue; */
            background-image: url("img/catFly.jpg");
            background-repeat: repeat;
            background-position: 0px 0px;
            background-size: 150px;


            body {
                background-color: cornflowerblue;
                background-image: url("img/repeat.jpg");
                background-repeat: repeat;
                background-position: top left;
                background-size: auto;
            }



            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 300px;
            height: 450px;
            background-color: rgb(232, 229, 179);
            text-align: center;
            border: 2px solid black;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .3);
            font-family: 'Poppins', sans-serif;

            display: flex;
            flex-direction: column;
        }

        .card img {
            width: 100%;
            height: 40%;
            object-fit: cover;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-top: 20px;
        }

        .card .title {
            font-size: 20px;
            color: deeppink;
            margin-top: 20px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card .contact {
            padding: 15px;
            margin-top: auto;
            background-color: black;
            color: #f1f1f1;
            font-size: 22px;
        }

        .card p {
            font-weight: 500;
        }
    </style>


</head>

<body>
    <div class="card">
        <img alt="img" src="img/pic1.jpg">
        <h1>john H watson</h1>
        <p class="title">cool kids receptor </p>
        <p>Harvard University</p>
        <p class="contact">contact</p>




    </div>
</body>

</html>
